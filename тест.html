<!DOCTYPE html>
<html lang="ru">
<head>
    <title> Главная страница </title>
    <meta charset="utf-8">
    <meta name="author" content="Котловский Максим">
    <meta name="description" content="Страница для тестового задания">
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h2>Благотворительный фонд "Лапка"</h2>
    <p><i>Давайте поможем нашим друзьям стать счастливее</i></p>
    <img src="https://aif-s3.aif.ru/images/018/627/6f238b54f4f54a212712a60e8cf4f88a.jpg">
    <form id="payment-form">
        <label for="lastName">Фамилия</label>
        <input type="text" id="lastName" placeholder="Иванов" name="lastName" required>
        <br></br>

        <label for="firstName">Имя</label>
        <input type="text" id="firstName" placeholder="Иван" name="firstName" required>
        <br></br>

        <label for="middleName">Отчество</label>
        <input type="text" id="middleName" placeholder="Иванович" name="middleName" required>
        <br></br>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Ваша почта" name="email" required>
        <br></br>

        <label for="phone">Номер телефона</label>
        <input type="phone" id="phone" placeholder="88005553535" name="phone" required>
        <br></br>

        <label for="comment">Комментарий</label>
        <textarea id="comment" placeholder="Дополнительная информация" name="comment"></textarea>
        <br></br>
    </form>

    <label for="paymentPeriod">Период регулярного платежа</label>
    <select id="paymentPeriod" name="paymentPeriod">
        <option value="pay">Разовый платеж</option>
        <option value="Day">Раз в день</option>
        <option value="Week">Раз в неделю</option>
        <option value="Month">Раз в месяц</option>
    </select>
    <button type="button" id="checkout">Оплатить</button>
    <br><br>
    <button type="button" id="checkout-oneclick">Оплата в один клик</button>

    <script>
        document.getElementById('checkout').addEventListener('click', function () {
            var email = document.getElementById('email').value;
            var phone = document.getElementById('phone').value;
            var firstName = document.getElementById('firstName').value;
            var lastName = document.getElementById('lastName').value;
            var middleName = document.getElementById('middleName').value;
            var comment = document.getElementById('comment').value;
            var paymentPeriod = document.getElementById('paymentPeriod').value;

            if (paymentPeriod === 'Day' || paymentPeriod === 'Week' || paymentPeriod === 'Month') {
                paymount(email, phone, firstName, lastName, middleName, comment, paymentPeriod);
            } else {
                pay(email, phone, firstName, lastName, middleName, comment);
            }
        });

        document.getElementById('checkout-oneclick').addEventListener('click', function () {
            var form = document.getElementById('payment-form');
            //    if (form && !form.reportValidity()) {
            //        return;
            //    }
            var email = document.getElementById('email').value;
            var phone = document.getElementById('phone').value;
            var firstName = document.getElementById('firstName').value;
            var lastName = document.getElementById('lastName').value;
            var middleName = document.getElementById('middleName').value;
            var comment = document.getElementById('comment').value;
            payOneClick(email, phone, firstName, lastName, middleName, comment);
        });

        function payOneClick(email, phone, firstName, lastName, middleName, comment) {
            var widget = new cp.CloudPayments();
            var intentParams = {
                publicTerminalId: 'pk_ea787d54d9946c0b2ceb91b092b5f',
                paymentSchema: 'Single',
                description: 'Пожертвование fondlapka.com (один клик)',
                amount: 249,
                currency: 'RUB',
                culture: 'ru-RU',
                tokenize: true,
                emailBehavior: 'Required',
                userInfo: {
                    accountId: email,
                    email: email,
                    phone: phone,
                    firstName: firstName,
                    lastName: lastName,
                    middleName: middleName
                },
                metadata: {
                    firstName: firstName,
                    lastName: lastName,
                    middleName: middleName,
                    phone: phone,
                    email: email,
                    comment: comment
                }
            };
            widget.oncomplete = function (result) {
                console.log('Виджет завершён:', result);
            };
            widget.start(intentParams).then(function (widgetResult) {
                if (widgetResult && widgetResult.status === 'success') {
                    alert('Оплата прошла успешно!');
                }
            }).catch(function (err) {
                console.error(err);
            });
        }

        function paymount(email, phone, firstName, lastName, middleName, comment, paymentPeriod) {
            var widget = new cp.CloudPayments();
            var amount = 700.00;
            var receipt = {
                Items: [
                    {
                        label: 'Подписка на фонд',
                        price: amount,
                        quantity: 1,
                        amount: amount,
                        vat: 20,
                        method: 0,
                        object: 0,
                    }
                ],
                taxationSystem: 0,
                email: email,
                phone: phone,
                isBso: false,
                amounts: {
                    electronic: amount,
                    advancePayment: 0.00,
                    credit: 0.00,
                    provision: 0.00
                }
            };

            var data = {};
            data.CloudPayments = {
                CustomerReceipt: receipt,
                recurrent: {
                    interval: paymentPeriod,
                    period: 1,
                    customerReceipt: receipt
                }
            };
            data.firstName = firstName;
            data.lastName = lastName;
            data.middleName = middleName;
            data.phone = phone;
            data.email = email;
            data.comment = comment;

            widget.pay('charge', {
                publicId: 'pk_ea787d54d9946c0b2ceb91b092b5f',
                description: 'Подписка на фонд',
                amount: amount,
                currency: 'RUB',
                invoiceId: 'sub_' + Date.now(),
                accountId: email,
                email: email,
                data: data
            },
            {
                onSuccess: function (options) {
                    alert('Оплата прошла успешно!');
                },
                onFail: function (reason, options) {
                    alert('Оплата не удалась. Причина: ' + reason);
                },
                onComplete: function (paymentResult, options) {
                    console.log('Результат платежа:', paymentResult);
                }
            });
        }

        function pay(email, phone, firstName, lastName, middleName, comment) {
            var widget = new cp.CloudPayments();
            widget.pay('charge', {
                publicId: 'pk_ea787d54d9946c0b2ceb91b092b5f',
                description: 'Разовая оплата fondlapka.com',
                amount: 249,
                currency: 'RUB',
                email: email,
                accountId: email,
                data: {
                    firstName: firstName,
                    lastName: lastName,
                    middleName: middleName,
                    phone: phone,
                    email: email,
                    comment: comment
                },
                configuration: {
                    common: {
                        successRedirectUrl: "https://{ваш сайт}/success",
                        failRedirectUrl: "https://{ваш сайт}/fail"
                    }
                }
            },
            {
                onSuccess: function () {
                    alert('Оплата прошла успешно!');
                },
                onFail: function (reason) {
                    alert('Оплата не удалась. Причина: ' + reason);
                },
                onComplete: function (paymentResult) {
                    console.log('Результат платежа:', paymentResult);
                }
            });
        }
    </script>
</body>
</html>
